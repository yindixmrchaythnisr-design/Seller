<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Setup | Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#111214] text-white h-screen flex overflow-hidden">

    <aside class="w-[80px] flex-shrink-0 bg-[#232527] border-r border-[#393b3d] flex flex-col items-center py-4 z-20">
        <div class="mb-8 cursor-pointer">
            <svg class="w-10 h-10 text-[#00b06f] transform rotate-[50deg]" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M0 0H24V24H0V0ZM8 8H16V16H8V8Z" />
            </svg>
        </div>
        <nav class="flex flex-col gap-6 w-full">
            <a href="#" class="flex flex-col items-center gap-1 group">
                <div class="w-10 h-10 rounded-full flex items-center justify-center text-[#bdbebe] group-hover:bg-[#393b3d] group-hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                </div>
                <span class="text-[11px] font-semibold text-[#bdbebe] group-hover:text-white">Dashboard</span>
            </a>
            <a href="#" class="flex flex-col items-center gap-1 group">
                <div class="w-10 h-10 rounded-full flex items-center justify-center bg-[#393b3d] text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </div>
                <span class="text-[11px] font-semibold text-white">Setup</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-y-auto">
        <header class="h-[70px] px-8 flex items-center justify-between border-b border-[#232527] sticky top-0 bg-[#111214]/95 backdrop-blur z-10">
            <h1 class="text-[24px] font-bold text-white tracking-tight">Seller Profile Setup</h1>
            <button class="bg-[#232527] border border-[#393b3d] text-white px-4 py-2 text-sm font-semibold rounded-md hover:bg-[#393b3d] transition-colors">
                Save Draft
            </button>
        </header>

        <div class="p-8 flex justify-center">
            <div class="w-full max-w-2xl bg-[#232527] rounded-xl p-8 shadow-xl">
                <h2 class="text-xl font-bold mb-2 text-white">Action Required: Complete Your Profile</h2>
                <p class="text-[14px] text-[#bdbebe] mb-8">Buyers and drivers need this information to accurately calculate shipping, display product criteria, and route orders.</p>
                
                <div class="space-y-6">
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-[13px] font-semibold text-[#bdbebe] mb-1.5">Seller / Business Age</label>
                            <input type="number" class="w-full bg-[#111214] border border-[#393b3d] rounded-md px-3 py-2.5 focus:border-[#00b06f] focus:outline-none text-[15px] text-white" placeholder="e.g. 25" />
                        </div>
                        <div>
                            <label class="block text-[13px] font-semibold text-[#bdbebe] mb-1.5">Default Price Rate ($)</label>
                            <input type="number" class="w-full bg-[#111214] border border-[#393b3d] rounded-md px-3 py-2.5 focus:border-[#00b06f] focus:outline-none text-[15px] text-white" placeholder="e.g. 50.00" />
                        </div>
                    </div>

                    <div class="my-6 border-t border-[#393b3d]"></div>
                    <h3 class="text-md font-bold text-white mb-4">Standard Package Specs</h3>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-[13px] font-semibold text-[#bdbebe] mb-1.5">Average Size (L x W x H inches)</label>
                            <input type="text" class="w-full bg-[#111214] border border-[#393b3d] rounded-md px-3 py-2.5 focus:border-[#00b06f] focus:outline-none text-[15px] text-white" placeholder="10 x 8 x 6" />
                        </div>
                        <div>
                            <label class="block text-[13px] font-semibold text-[#bdbebe] mb-1.5">Average Weight (lbs)</label>
                            <input type="number" class="w-full bg-[#111214] border border-[#393b3d] rounded-md px-3 py-2.5 focus:border-[#00b06f] focus:outline-none text-[15px] text-white" placeholder="e.g. 2.5" />
                        </div>
                    </div>

                    <button class="w-full bg-[#00b06f] hover:bg-[#008f5a] text-white rounded-md px-4 py-3 font-bold text-[16px] mt-8 transition-colors">
                        Confirm & Save Profile
                    </button>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
