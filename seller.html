<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Console | Minimal Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

    <header class="bg-slate-900 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-semibold tracking-wide border-r border-gray-600 pr-4">Marketplace<span class="text-gray-400 font-normal">Console</span></h1>
            <span class="text-sm font-medium text-gray-300">Seller Dashboard</span>
        </div>
        <button class="text-sm bg-slate-800 border border-slate-700 rounded px-3 py-1.5 hover:bg-slate-700 transition">Sign Out</button>
    </header>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6 mt-4">
        
        <section class="lg:col-span-1">
            <div class="bg-white border border-gray-200 rounded-lg shadow-sm p-5">
                <h2 class="text-lg font-semibold text-gray-800 mb-4 pb-2 border-b border-gray-100">Create New Listing</h2>
                
                <form class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Product Title</label>
                        <input type="text" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-green-500 focus:border-green-500" placeholder="e.g., Wireless Mouse">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                        <textarea class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-green-500 focus:border-green-500" rows="3" placeholder="Condition, specs, etc."></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Price ($)</label>
                            <input type="number" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-green-500 focus:border-green-500" placeholder="0.00">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Stock</label>
                            <input type="number" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-green-500 focus:border-green-500" placeholder="1">
                        </div>
                    </div>
                    
                    <div class="pt-2 flex gap-3">
                        <button type="button" class="flex-1 bg-gray-100 text-gray-700 border border-gray-300 rounded px-4 py-2 text-sm font-medium hover:bg-gray-200 transition">Clear</button>
                        <button type="button" class="flex-1 bg-green-600 text-white rounded px-4 py-2 text-sm font-medium hover:bg-green-700 transition shadow-sm">Publish</button>
                    </div>
                </form>
            </div>
        </section>

        <section class="lg:col-span-2 space-y-6">
            
            <div class="bg-white border border-gray-200 rounded-lg shadow-sm">
                <div class="p-4 border-b border-gray-200 bg-gray-50 rounded-t-lg flex justify-between items-center">
                    <h2 class="text-md font-semibold text-gray-800">Action Required: Pending Bids</h2>
                    <span class="bg-yellow-100 text-yellow-800 text-xs font-bold px-2 py-1 rounded-full">2 New</span>
                </div>
                <div class="p-0 divide-y divide-gray-100">
                    
                    <div class="p-4 flex items-center justify-between hover:bg-gray-50 transition">
                        <div>
                            <p class="text-sm font-medium text-gray-900">Offer: <span class="text-green-600 font-bold">$45.00</span> <span class="text-gray-500 font-normal">on Vintage Camera</span></p>
                            <p class="text-xs text-gray-500 mt-1">From: @alex_dev • 10 mins ago</p>
                        </div>
                        <div class="flex gap-2">
                            <button class="bg-white border border-red-300 text-red-600 hover:bg-red-50 rounded px-3 py-1.5 text-xs font-medium transition">Reject</button>
                            <button class="bg-green-600 text-white hover:bg-green-700 rounded px-3 py-1.5 text-xs font-medium transition shadow-sm">Accept & Ship</button>
                        </div>
                    </div>

                </div>
            </div>

            <div class="bg-white border border-gray-200 rounded-lg shadow-sm">
                <div class="p-4 border-b border-gray-200 bg-gray-50 rounded-t-lg">
                    <h2 class="text-md font-semibold text-gray-800">Your Inventory</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider border-b border-gray-200">
                                <th class="p-4 font-medium">Item Name</th>
                                <th class="p-4 font-medium">Status</th>
                                <th class="p-4 font-medium">Price</th>
                                <th class="p-4 font-medium text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-sm">
                            <tr>
                                <td class="p-4 font-medium text-gray-900">Mechanical Keyboard</td>
                                <td class="p-4"><span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">Active</span></td>
                                <td class="p-4 text-gray-600">$120.00</td>
                                <td class="p-4 text-right">
                                    <button class="text-blue-600 hover:text-blue-800 text-sm font-medium mr-3">Edit</button>
                                    <button class="text-red-600 hover:text-red-800 text-sm font-medium">Remove</button>
                                </td>
                            </tr>
                            <tr>
                                <td class="p-4 font-medium text-gray-900">Desk Lamp</td>
                                <td class="p-4"><span class="bg-yellow-100 text-yellow-800 text-xs px-2 py-1 rounded-full">In Delivery</span></td>
                                <td class="p-4 text-gray-600">$25.00</td>
                                <td class="p-4 text-right">
                                    <button class="text-gray-400 cursor-not-allowed text-sm font-medium" disabled>Locked</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
</body>
</html>
