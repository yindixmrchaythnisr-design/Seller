<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatch | Minimal Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen selection:bg-white selection:text-black">
    <nav class="border-b border-gray-800 p-6 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tight text-white">Dispatch.</h1>
        <div class="flex items-center gap-3 text-sm">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            Online & Waiting
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 mt-8">
        <h2 class="text-lg font-semibold mb-6 border-b border-gray-800 pb-2">Available Routes</h2>
        
        <div class="space-y-4">
            <div class="border border-gray-700 p-5 flex flex-col md:flex-row justify-between items-start md:items-center bg-gray-950">
                <div class="mb-4 md:mb-0">
                    <div class="flex items-center gap-3 mb-1">
                        <span class="bg-white text-black text-xs font-bold px-2 py-1">NEW</span>
                        <p class="font-mono text-sm text-gray-300">REQ-8092</p>
                    </div>
                    <p class="font-medium text-lg">Seller: Retro Tech Store</p>
                    <p class="text-sm text-gray-400 mt-1">Pickup: 123 Main St → Dropoff: 456 Elm St</p>
                    <p class="text-sm text-gray-400">Est. Payout: <span class="text-white font-mono">$15.00</span></p>
                </div>
                <button class="w-full md:w-auto bg-white text-black px-8 py-3 font-bold hover:bg-gray-200 transition">
                    Accept Delivery
                </button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-setup.js"></script>
</body>
</html>
