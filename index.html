<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Minimal Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* AWS uses Amazon Ember, but this stack mimics it perfectly on standard machines */
        body { font-family: "Amazon Ember", "Helvetica Neue", Roboto, Arial, sans-serif; }
    </style>
</head>
<body class="bg-[#f2f3f3] text-[#16191f] min-h-screen flex flex-col">

    <header class="bg-[#232f3e] text-white h-[60px] flex items-center px-6">
        <div class="flex items-center gap-2">
            <svg class="w-6 h-6 text-[#ff9900]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2zm0 4.5l6.5 13.5h-13L12 6.5z"/></svg>
            <h1 class="text-[18px] font-medium">Marketplace Services</h1>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center pt-10 px-4">
        <div class="w-full max-w-[380px] bg-white border border-[#d5dbdb] rounded-[2px] p-6 shadow-[0_1px_1px_rgba(0,0,0,0.05)]">
            <h2 class="text-[28px] font-normal mb-5 text-[#16191f]" id="form-title">Sign in</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[13px] font-medium text-[#16191f] mb-1">Email address</label>
                    <input type="email" id="email" class="w-full border border-[#879596] rounded-[2px] px-3 py-[6px] focus:border-[#0073bb] focus:ring-1 focus:ring-[#0073bb] focus:outline-none text-[14px] shadow-[inset_0_1px_2px_rgba(0,0,0,0.1)]" />
                </div>
                
                <div>
                    <label class="block text-[13px] font-medium text-[#16191f] mb-1">Password</label>
                    <input type="password" id="password" class="w-full border border-[#879596] rounded-[2px] px-3 py-[6px] focus:border-[#0073bb] focus:ring-1 focus:ring-[#0073bb] focus:outline-none text-[14px] shadow-[inset_0_1px_2px_rgba(0,0,0,0.1)]" />
                </div>

                <div id="role-container" class="hidden">
                    <label class="block text-[13px] font-medium text-[#16191f] mb-1">Account Type</label>
                    <select id="role" class="w-full border border-[#879596] rounded-[2px] px-3 py-[6px] focus:border-[#0073bb] focus:ring-1 focus:ring-[#0073bb] focus:outline-none text-[14px] shadow-[inset_0_1px_2px_rgba(0,0,0,0.1)] bg-white">
                        <option value="customer">Customer</option>
                        <option value="seller">Seller</option>
                        <option value="driver">Delivery Driver</option>
                    </select>
                </div>

                <button id="auth-btn" onclick="handleAuth()" class="w-full bg-[#ec7211] hover:bg-[#eb5f07] text-white rounded-[2px] px-4 py-[6px] font-bold text-[13px] mt-2">
                    Sign in
                </button>
            </div>
        </div>

        <div class="w-full max-w-[380px] mt-6">
            <div class="flex items-center justify-center space-x-2 mb-4">
                <div class="h-px bg-[#d5dbdb] flex-1"></div>
                <span id="toggle-text" class="text-[13px] text-[#545b64]">New to Marketplace?</span>
                <div class="h-px bg-[#d5dbdb] flex-1"></div>
            </div>
            
            <button onclick="toggleMode()" id="toggle-btn" class="w-full bg-white hover:bg-[#fafafa] border border-[#d5dbdb] text-[#16191f] rounded-[2px] px-4 py-[6px] font-bold text-[13px] shadow-[0_1px_1px_rgba(0,0,0,0.05)]">
                Create a new account
            </button>
        </div>
        
        <div id="error-msg" class="hidden w-full max-w-[380px] mt-4 bg-[#fdf3f3] border border-[#d91515] text-[#d91515] px-4 py-3 rounded-[2px] text-[13px]"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>

    <script>
        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? "Sign in" : "Create account";
            document.getElementById('auth-btn').innerText = isLogin ? "Sign in" : "Create account";
            document.getElementById('toggle-text').innerText = isLogin ? "New to Marketplace?" : "Already have an account?";
            document.getElementById('toggle-btn').innerText = isLogin ? "Create a new account" : "Sign in to an existing account";
            document.getElementById('role-container').style.display = isLogin ? "none" : "block";
            document.getElementById('error-msg').classList.add('hidden');
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const errorMsg = document.getElementById('error-msg');
            const authBtn = document.getElementById('auth-btn');
            
            errorMsg.classList.add('hidden');
            authBtn.innerText = "Processing...";
            authBtn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                if (isLogin) {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    
                    const { data: profile } = await supabase.from('profiles').select('role').eq('id', data.user.id).single();
                    routeUser(profile.role);
                } else {
                    const { data, error } = await supabase.auth.signUp({ email, password });
                    if (error) throw error;

                    const { error: profileError } = await supabase.from('profiles').insert([
                        { id: data.user.id, email: email, role: role }
                    ]);
                    if (profileError) throw profileError;

                    routeUser(role);
                }
            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.classList.remove('hidden');
                authBtn.innerText = isLogin ? "Sign in" : "Create account";
                authBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }

        function routeUser(role) {
            if (role === 'customer') window.location.href = 'buyer.html';
            if (role === 'seller') window.location.href = 'seller.html';
            if (role === 'driver') window.location.href = 'dispatch.html';
        }
    </script>
</body>
</html>
