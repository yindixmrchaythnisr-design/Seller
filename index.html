<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Marketplace Services Console</title>
    <style>
        :root {
            --aws-navy: #232f3e;
            --aws-dark-blue: #16191f;
            --background-grey: #f2f3f3;
            --text-black: #16191f;
            --aws-orange: #ec7211;
            --border-grey: #d5dbdb;
            --card-shadow: 0 1px 1px rgba(0, 0, 0, 0.05);
            --aws-orange-hover: #eb5f07;
            --text-grey: #545b64;
            --secondary-btn-hover: #fafafa;
            --focus-blue: #0073bb;
        }

        body {
            font-family: "Amazon Ember", "Helvetica Neue", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--background-grey);
            color: var(--text-black);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        header {
            background-color: var(--aws-navy);
            color: #fff;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 24px;
            box-sizing: border-box;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header .brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Tilted Square Icon with square hole */
        header .brand-logo svg {
            height: 28px;
            width: auto;
            fill: #fff;
        }

        header h1 {
            font-size: 18px;
            font-weight: 500;
            margin: 0;
            line-height: 60px;
        }

        /* Main Content */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 24px;
            box-sizing: border-box;
        }

        /* Central Card */
        .sign-in-card {
            background-color: #fff;
            border: 1px solid var(--border-grey);
            border-radius: 2px;
            width: 100%;
            max-width: 380px;
            padding: 32px;
            box-sizing: border-box;
            box-shadow: var(--card-shadow);
        }

        .sign-in-card h2 {
            font-size: 28px;
            font-weight: 400;
            margin: 0 0 24px 0;
            color: var(--text-black);
        }

        /* Form Elements */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-black);
        }

        .input-group input {
            width: 100%;
            padding: 7px 12px;
            font-size: 14px;
            border: 1px solid #879596;
            border-radius: 2px;
            box-sizing: border-box;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
            color: var(--text-black);
        }

        .input-group input::placeholder {
            color: #879596;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--focus-blue);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1), 0 0 0 1px var(--focus-blue);
        }

        /* Primary Button (AWS Orange) */
        .primary-button {
            display: block;
            width: 100%;
            background-color: var(--aws-orange);
            color: #fff;
            border: 1px solid #b65a0c;
            border-radius: 2px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            box-sizing: border-box;
            text-align: center;
            text-decoration: none;
            transition: background-color 0.1s;
            margin-top: 10px;
        }

        .primary-button:hover {
            background-color: var(--aws-orange-hover);
        }

        /* Secondary Content Below Card */
        .secondary-actions {
            width: 100%;
            max-width: 380px;
            margin: 24px auto 0;
            text-align: center;
        }

        .divider {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        .divider .line {
            flex-grow: 1;
            height: 1px;
            background-color: var(--border-grey);
        }

        .divider p {
            font-size: 13px;
            color: var(--text-grey);
            margin: 0 8px;
        }

        /* Secondary Button (White) */
        .secondary-button {
            display: block;
            width: 100%;
            background-color: #fff;
            color: var(--text-black);
            border: 1px solid var(--border-grey);
            border-radius: 2px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            box-sizing: border-box;
            text-align: center;
            text-decoration: none;
            transition: background-color 0.1s;
            box-shadow: var(--card-shadow);
        }

        .secondary-button:hover {
            background-color: var(--secondary-btn-hover);
        }

    </style>
</head>
<body>

    <header>
        <div class="brand-logo">
            <svg viewBox="0 0 24 24" fill="#fff" xmlns="http://www.w3.org/2000/svg">
                <path d="M4.646 2.354l16.999 4.555-4.555 16.999-16.999-4.555 4.555-16.999zm8.5 10.777a2.278 2.278 0 100-4.555 2.278 2.278 0 000 4.555z"/>
            </svg>
            <h1>Marketplace Services</h1>
        </div>
    </header>

    <main>
        <div class="sign-in-card">
            <h2>Sign in</h2>
            <form action="[your sign-in handler]" method="post">
                <div class="input-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="user@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="primary-button">Sign in</button>
            </form>
        </div>

        <div class="secondary-actions">
            <div class="divider">
                <div class="line"></div>
                <p>New to Marketplace Services?</p>
                <div class="line"></div>
            </div>
            <a href="[your account creation page]" class="secondary-button">Create a new account</a>
        </div>
    </main>

</body>
</html>
