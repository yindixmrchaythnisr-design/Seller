<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal | Minimal Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }</style>
</head>
<body class="bg-white text-black min-h-screen flex flex-col items-center justify-center selection:bg-black selection:text-white">
    
    <main class="w-full px-6 flex flex-col items-center">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold tracking-tight mb-2">Minimal Market.</h1>
            <p class="text-gray-600">Select your portal to continue.</p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl w-full">
            <a href="buyer.html" class="border border-black p-10 hover:bg-black hover:text-white transition group flex flex-col items-center text-center cursor-pointer">
                <svg class="w-8 h-8 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <h2 class="text-xl font-bold mb-2">Customer</h2>
                <p class="text-sm text-gray-500 group-hover:text-gray-300">Browse listings, place bids, and buy items.</p>
            </a>
            
            <a href="seller.html" class="border border-black p-10 hover:bg-black hover:text-white transition group flex flex-col items-center text-center cursor-pointer">
                <svg class="w-8 h-8 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                <h2 class="text-xl font-bold mb-2">Seller</h2>
                <p class="text-sm text-gray-500 group-hover:text-gray-300">Create listings, manage inventory, and negotiate.</p>
            </a>
            
            <a href="dispatch.html" class="border border-black p-10 hover:bg-black hover:text-white transition group flex flex-col items-center text-center cursor-pointer">
                <svg class="w-8 h-8 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                <h2 class="text-xl font-bold mb-2">Driver</h2>
                <p class="text-sm text-gray-500 group-hover:text-gray-300">Accept delivery routes and manage drop-offs.</p>
            </a>
        </div>
    </main>

</body>
</html>
