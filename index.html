    <script>
        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? "Login to Marketplace" : "Sign Up for Marketplace";
            document.getElementById('auth-btn').innerText = isLogin ? "Log In" : "Sign Up";
            document.getElementById('toggle-text').innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            document.getElementById('toggle-btn').innerText = isLogin ? "Sign Up" : "Log In";
            document.getElementById('role-container').classList.toggle('hidden', isLogin);
            document.getElementById('error-msg').classList.add('hidden');
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const errorMsg = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');
            const authBtn = document.getElementById('auth-btn');
            
            errorMsg.classList.add('hidden');
            authBtn.innerText = "Authenticating...";
            authBtn.disabled = true;

            try {
                if (isLogin) {
                    // 1. SIGN IN
                    const { data, error } = await supabaseApp.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    
                    // 2. FETCH ROLE FROM DATABASE
                    const { data: profile, error: profileError } = await supabaseApp
                        .from('profiles')
                        .select('role')
                        .eq('id', data.user.id)
                        .maybeSingle();
    
                    if (profileError) throw profileError;

                    // If profile doesn't exist yet (rare), check metadata
                    const userRole = profile?.role || data.user.user_metadata?.role || 'customer'; 
                    routeUser(userRole);

                } else {
                    // 1. SIGN UP
                    const { data, error } = await supabaseApp.auth.signUp({ 
                        email, 
                        password,
                        options: { data: { role: role } } // Pass role to metadata for the trigger
                    });
                    if (error) throw error;
                    if (!data.user) throw new Error("Check your email for a confirmation link!");

                    // 2. CREATE PROFILE (Backup in case trigger fails)
                    const { error: profileError } = await supabaseApp.from('profiles').upsert([
                        { id: data.user.id, email: email, role: role }
                    ]);
                    if (profileError) console.warn("Profile already exists or trigger handled it.");

                    routeUser(role);
                }
            } catch (err) {
                errorText.innerText = err.message;
                errorMsg.classList.remove('hidden');
                authBtn.innerText = isLogin ? "Log In" : "Sign Up";
                authBtn.disabled = false;
            }
        }

        function routeUser(role) {
            console.log("Routing user with role:", role);
            if (role === 'seller') {
                window.location.href = 'seller.html';
            } else if (role === 'driver') {
                window.location.href = 'dispatch.html';
            } else {
                window.location.href = 'buyer.html';
            }
        }
    </script>
