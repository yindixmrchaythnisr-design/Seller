<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Minimal Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

    <header class="bg-slate-900 text-white p-4 shadow-md flex justify-between items-center">
        <div class="flex items-center gap-2">
            <svg class="w-6 h-6 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            <h1 class="text-lg font-semibold tracking-wide">Marketplace<span class="text-gray-400 font-normal">Console</span></h1>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white border border-gray-200 rounded-lg shadow-sm p-8">
            <h2 class="text-2xl font-bold mb-6 text-gray-800" id="form-title">Sign In</h2>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                    <input type="email" id="email" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 transition" placeholder="user@example.com">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 transition" placeholder="••••••••">
                </div>

                <div id="role-container" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Account Type</label>
                    <select id="role" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 bg-white">
                        <option value="customer">Customer</option>
                        <option value="seller">Seller</option>
                        <option value="driver">Delivery Driver</option>
                    </select>
                </div>

                <button id="auth-btn" onclick="handleAuth()" class="w-full bg-green-600 text-white rounded-md px-4 py-2 font-medium hover:bg-green-700 focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition mt-2 shadow-sm">
                    Sign In
                </button>
            </div>

            <div class="mt-6 pt-6 border-t border-gray-200 text-center">
                <p class="text-sm text-gray-600">
                    <span id="toggle-text">New to the platform?</span> 
                    <button onclick="toggleMode()" class="text-green-600 font-medium hover:text-green-700 hover:underline">Create a new account</button>
                </p>
            </div>
            
            <div id="error-msg" class="hidden mt-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-md text-sm"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>

    <script>
        let isLogin = true; // Default to login to look more professional

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? "Sign In" : "Create Account";
            document.getElementById('auth-btn').innerText = isLogin ? "Sign In" : "Create Account";
            document.getElementById('toggle-text').innerText = isLogin ? "New to the platform?" : "Already have an account?";
            document.getElementById('role-container').style.display = isLogin ? "none" : "block";
            document.getElementById('error-msg').classList.add('hidden');
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const errorMsg = document.getElementById('error-msg');
            const authBtn = document.getElementById('auth-btn');
            
            errorMsg.classList.add('hidden');
            authBtn.innerText = "Processing...";
            authBtn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                if (isLogin) {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    
                    const { data: profile } = await supabase.from('profiles').select('role').eq('id', data.user.id).single();
                    routeUser(profile.role);
                } else {
                    const { data, error } = await supabase.auth.signUp({ email, password });
                    if (error) throw error;

                    const { error: profileError } = await supabase.from('profiles').insert([
                        { id: data.user.id, email: email, role: role }
                    ]);
                    if (profileError) throw profileError;

                    routeUser(role);
                }
            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.classList.remove('hidden');
                authBtn.innerText = isLogin ? "Sign In" : "Create Account";
                authBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }

        function routeUser(role) {
            if (role === 'customer') window.location.href = 'buyer.html';
            if (role === 'seller') window.location.href = 'seller.html';
            if (role === 'driver') window.location.href = 'dispatch.html';
        }
    </script>
</body>
</html>
