<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal | Minimal Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col font-sans">

    <header class="bg-black text-white h-14 flex items-center px-6 shadow-sm">
        <div class="flex items-center gap-3">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
            <h1 class="text-base font-semibold tracking-wide">Minimal Market Console</h1>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center pt-16 px-4">
        <div class="w-full max-w-md bg-white border border-gray-200 rounded-md p-8 shadow-sm">
            <h2 class="text-2xl font-semibold mb-6 text-black" id="form-title">Sign in</h2>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Email address</label>
                    <input type="email" id="email" class="w-full border border-gray-300 rounded px-3 py-2 focus:border-black focus:ring-1 focus:ring-black focus:outline-none text-sm transition" />
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                    <input type="password" id="password" class="w-full border border-gray-300 rounded px-3 py-2 focus:border-black focus:ring-1 focus:ring-black focus:outline-none text-sm transition" />
                </div>

                <div id="role-container" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Account Type</label>
                    <select id="role" class="w-full border border-gray-300 rounded px-3 py-2 focus:border-black focus:ring-1 focus:ring-black focus:outline-none text-sm bg-white transition">
                        <option value="customer">Customer</option>
                        <option value="seller">Seller</option>
                        <option value="driver">Delivery Driver</option>
                    </select>
                </div>

                <button id="auth-btn" onclick="handleAuth()" class="w-full bg-green-600 hover:bg-green-700 text-white rounded px-4 py-2.5 font-medium text-sm transition shadow-sm mt-2">
                    Sign in
                </button>
            </div>
        </div>

        <div class="w-full max-w-md mt-6 text-center">
            <p class="text-sm text-gray-600">
                <span id="toggle-text">New to the platform?</span> 
                <button onclick="toggleMode()" id="toggle-btn" class="text-black font-semibold hover:underline ml-1">
                    Create an account
                </button>
            </p>
        </div>
        
        <div id="error-msg" class="hidden w-full max-w-md mt-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded text-sm"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>

    <script>
        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? "Sign in" : "Create account";
            document.getElementById('auth-btn').innerText = isLogin ? "Sign in" : "Create account";
            document.getElementById('toggle-text').innerText = isLogin ? "New to the platform?" : "Already have an account?";
            document.getElementById('toggle-btn').innerText = isLogin ? "Create an account" : "Sign in instead";
            document.getElementById('role-container').style.display = isLogin ? "none" : "block";
            document.getElementById('error-msg').classList.add('hidden');
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const errorMsg = document.getElementById('error-msg');
            const authBtn = document.getElementById('auth-btn');
            
            errorMsg.classList.add('hidden');
            authBtn.innerText = "Processing...";
            authBtn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                if (isLogin) {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    
                    const { data: profile } = await supabase.from('profiles').select('role').eq('id', data.user.id).single();
                    routeUser(profile.role);
                } else {
                    const { data, error } = await supabase.auth.signUp({ email, password });
                    if (error) throw error;

                    const { error: profileError } = await supabase.from('profiles').insert([
                        { id: data.user.id, email: email, role: role }
                    ]);
                    if (profileError) throw profileError;

                    routeUser(role);
                }
            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.classList.remove('hidden');
                authBtn.innerText = isLogin ? "Sign in" : "Create account";
                authBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }

        function routeUser(role) {
            if (role === 'customer') window.location.href = 'buyer.html';
            if (role === 'seller') window.location.href = 'seller.html';
            if (role === 'driver') window.location.href = 'dispatch.html';
        }
    </script>
</body>
</html>
