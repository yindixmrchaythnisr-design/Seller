<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Minimal Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-black min-h-screen flex flex-col items-center justify-center">

    <main class="w-full max-w-md px-6 flex flex-col items-center">
        <h1 class="text-3xl font-bold tracking-tight mb-8">Minimal Market.</h1>
        
        <div class="w-full border border-black p-6">
            <h2 class="text-xl font-bold mb-4" id="form-title">Create Account</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Email</label>
                    <input type="email" id="email" class="w-full border border-black p-2 focus:outline-none" placeholder="you@email.com">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-1">Password</label>
                    <input type="password" id="password" class="w-full border border-black p-2 focus:outline-none" placeholder="••••••••">
                </div>

                <div id="role-container">
                    <label class="block text-sm font-medium mb-1">I am a...</label>
                    <select id="role" class="w-full border border-black p-2 focus:outline-none bg-white">
                        <option value="customer">Customer</option>
                        <option value="seller">Seller</option>
                        <option value="driver">Delivery Driver</option>
                    </select>
                </div>

                <button id="auth-btn" onclick="handleAuth()" class="w-full bg-black text-white p-3 font-bold hover:bg-gray-800 transition mt-4">
                    Sign Up
                </button>
            </div>

            <p class="text-sm mt-4 text-center">
                <span id="toggle-text">Already have an account?</span> 
                <button onclick="toggleMode()" class="font-bold underline hover:text-gray-600">Login here</button>
            </p>
        </div>
        <p id="error-msg" class="text-red-500 text-sm mt-4 hidden"></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>

    <script>
        let isLogin = false;

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? "Login" : "Create Account";
            document.getElementById('auth-btn').innerText = isLogin ? "Login" : "Sign Up";
            document.getElementById('toggle-text').innerText = isLogin ? "Need an account?" : "Already have an account?";
            // Hide the role selector if logging in
            document.getElementById('role-container').style.display = isLogin ? "none" : "block";
            document.getElementById('error-msg').classList.add('hidden');
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const errorMsg = document.getElementById('error-msg');
            
            errorMsg.classList.add('hidden');
            document.getElementById('auth-btn').innerText = "Processing...";

            try {
                if (isLogin) {
                    // LOGIN FLOW
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    
                    // Fetch user's role to redirect them to the right page
                    const { data: profile } = await supabase.from('profiles').select('role').eq('id', data.user.id).single();
                    routeUser(profile.role);

                } else {
                    // SIGNUP FLOW
                    const { data, error } = await supabase.auth.signUp({ email, password });
                    if (error) throw error;

                    // Save their role to the profiles table
                    const { error: profileError } = await supabase.from('profiles').insert([
                        { id: data.user.id, email: email, role: role }
                    ]);
                    if (profileError) throw profileError;

                    routeUser(role);
                }
            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.classList.remove('hidden');
                document.getElementById('auth-btn').innerText = isLogin ? "Login" : "Sign Up";
            }
        }

        function routeUser(role) {
            if (role === 'customer') window.location.href = 'buyer.html';
            if (role === 'seller') window.location.href = 'seller.html';
            if (role === 'driver') window.location.href = 'dispatch.html';
        }
    </script>
</body>
</html>
