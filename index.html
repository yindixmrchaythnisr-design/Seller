<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Marketplace Services Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Using a system font stack that mimics the dense console look */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol"; }
    </style>
</head>
<body class="bg-[#f2f3f3] text-[#16191f] min-h-screen flex flex-col">

    <header class="bg-[#0e3c2f] text-white h-[60px] flex items-center px-6 shadow-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img src="path/to/your/image.png" alt="Icon" class="w-7 h-7 object-contain">
            <h1 class="text-[18px] font-semibold tracking-wide">Marketplace Services<span class="text-gray-400 font-normal"> Console</span></h1>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center pt-12 px-4">
        <div class="w-full max-w-[420px] bg-white border border-[#d5dbdb] rounded-[2px] p-8 shadow-[0_1px_1px_rgba(0,0,0,0.05)]">
            <h2 class="text-[28px] font-normal mb-6 text-[#16191f]" id="form-title">Sign in</h2>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-[13px] font-medium text-[#16191f] mb-1.5">Email address</label>
                    <input type="email" id="email" class="w-full border border-[#879596] rounded-[2px] px-3 py-2 focus:border-[#0073bb] focus:ring-1 focus:ring-[#0073bb] focus:outline-none text-[14px] shadow-[inset_0_1px_2px_rgba(0,0,0,0.1)] transition-colors" placeholder="user@example.com" />
                </div>
                
                <div>
                    <label class="block text-[13px] font-medium text-[#16191f] mb-1.5">Password</label>
                    <input type="password" id="password" class="w-full border border-[#879596] rounded-[2px] px-3 py-2 focus:border-[#0073bb] focus:ring-1 focus:ring-[#0073bb] focus:outline-none text-[14px] shadow-[inset_0_1px_2px_rgba(0,0,0,0.1)] transition-colors" placeholder="••••••••" />
                </div>

                <div id="role-container" class="hidden space-y-1.5">
                    <label class="block text-[13px] font-medium text-[#16191f]">Account Type</label>
                    <select id="role" class="w-full border border-[#879596] rounded-[2px] px-3 py-2 focus:border-[#0073bb] focus:ring-1 focus:ring-[#0073bb] focus:outline-none text-[14px] bg-white shadow-[inset_0_1px_2px_rgba(0,0,0,0.1)] transition-colors">
                        <option value="customer">Customer</option>
                        <option value="seller">Seller</option>
                        <option value="driver">Delivery Driver</option>
                    </select>
                </div>

                <button id="auth-btn" onclick="handleAuth()" class="w-full bg-[#1e7e34] hover:bg-[#19692c] text-white rounded-[2px] px-4 py-2 font-bold text-[13px] mt-3 shadow-sm transition-colors active:bg-[#155724]">
                    Sign in
                </button>
            </div>
        </div>

        <div class="w-full max-w-[420px] mt-8 text-center">
            <div class="relative mb-6">
                <div class="absolute inset-0 flex items-center" aria-hidden="true">
                    <div class="w-full border-t border-[#d5dbdb]"></div>
                </div>
                <div class="relative flex justify-center">
                    <span id="toggle-text" class="bg-[#f2f3f3] px-3 text-[13px] text-[#545b64]">New to Marketplace Services?</span>
                </div>
            </div>
            
            <button onclick="toggleMode()" id="toggle-btn" class="w-full bg-white hover:bg-[#fafafa] border border-[#d5dbdb] text-[#16191f] rounded-[2px] px-4 py-2 font-bold text-[13px] shadow-[0_1px_1px_rgba(0,0,0,0.05)] transition-colors active:bg-[#f2f3f3]">
                Create a new account
            </button>
        </div>
        
        <div id="error-msg" class="hidden w-full max-w-[420px] mt-6 bg-[#fdf3f3] border border-[#d91515] text-[#d91515] px-4 py-3 rounded-[2px] text-[13px] font-medium flex items-center gap-2">
            <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
            <span id="error-text"></span>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>

    <script>
        let isLogin = true;

        // Toggle between Sign In and Sign Up modes
        function toggleMode() {
            isLogin = !isLogin;
            
            // Update UI text
            const title = isLogin ? "Sign in" : "Create account";
            document.getElementById('form-title').innerText = title;
            document.getElementById('auth-btn').innerText = title;
            document.getElementById('toggle-text').innerText = isLogin ? "New to Marketplace Services?" : "Already have an account?";
            document.getElementById('toggle-btn').innerText = isLogin ? "Create a new account" : "Sign in to an existing account";
            
            // Show/hide role selector and reset errors
            document.getElementById('role-container').style.display = isLogin ? "none" : "block";
            document.getElementById('error-msg').classList.add('hidden');
        }

        // Handle the authentication action
        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const errorMsg = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');
            const authBtn = document.getElementById('auth-btn');
            
            // Reset state
            errorMsg.classList.add('hidden');
            authBtn.innerText = "Processing...";
            authBtn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                if (isLogin) {
                    // Sign In Flow
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    
                    // Retrieve role from profiles table for routing
                    const { data: profile, error: profileError } = await supabase
                        .from('profiles')
                        .select('role')
                        .eq('id', data.user.id)
                        .single();
                        
                    if (profileError) throw profileError;
                    routeUser(profile.role);
                } else {
                    // Sign Up Flow
                    const { data, error } = await supabase.auth.signUp({ email, password });
                    if (error) throw error;

                    if (!data.user) throw new Error("Signup failed. Please try again.");

                    // Insert user profile with selected role
                    const { error: profileError } = await supabase.from('profiles').insert([
                        { id: data.user.id, email: email, role: role }
                    ]);
                    if (profileError) throw profileError;

                    routeUser(role);
                }
            } catch (err) {
                // Display specific console-style error
                errorText.innerText = err.message;
                errorMsg.classList.remove('hidden');
                authBtn.innerText = isLogin ? "Sign in" : "Create account";
                authBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }

        // Redirect user based on their specific role
        function routeUser(role) {
            const routes = {
                'customer': 'buyer.html',
                'seller': 'seller.html',
                'driver': 'dispatch.html'
            };
            window.location.href = routes[role] || 'index.html';
        }
