<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กะหรี่เดลิเวอรี่ | Minimal กระหรี่เดลิเวอรี่</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-black min-h-screen">
    <nav class="border-b border-black p-6 flex justify-between items-center bg-white sticky top-0">
        <h1 class="text-xl font-bold tracking-tight">กะหลี่เดลิเวอรี่.</h1>
        <div class="flex gap-4">
            <button class="text-sm border border-black px-4 py-2 hover:bg-black hover:text-white transition">My DMs (2)</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 mt-8">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">
            <div class="border border-black group flex flex-col">
                <div class="h-48 bg-gray-100 border-b border-black flex items-center justify-center text-gray-400 text-sm">
                    [Product Image]
                </div>
                <div class="p-4 flex-1 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold">Mechanical Keyboard</h3>
                            <span class="font-mono text-sm">$120</span>
                        </div>
                        <p class="text-sm text-gray-600 mb-4">Custom built, slightly used. Ships in 1-2 days.</p>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mt-4">
                        <button class="border border-black py-2 text-sm hover:bg-black hover:text-white transition">Buy Now</button>
                        <button class="border border-black py-2 text-sm bg-black text-white hover:bg-gray-800 transition">Bid / DM</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-setup.js"></script>
</body>
</html>
