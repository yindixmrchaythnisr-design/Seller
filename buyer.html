<button onclick="handleLogout()" class="text-xs text-[#f87171] hover:underline mt-auto mb-4">
    Logout
</button>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
    (async function protectPage() {
        // 1. Get current session
        const { data: { session } } = await supabaseApp.auth.getSession();
        
        if (!session) {
            // Not logged in? Send to login
            window.location.href = 'index.html';
            return;
        }

        // 2. Check Role
        const { data: profile } = await supabaseApp
            .from('profiles')
            .select('role')
            .eq('id', session.user.id)
            .single();

        const currentPage = window.location.pathname;
        const role = profile?.role;

        // 3. Logic for Blocking
        // Check if the role matches the specific file they are trying to view
        if (role === 'seller' && !currentPage.includes('seller.html')) {
            window.location.href = 'seller.html';
        } else if (role === 'driver' && !currentPage.includes('dispatch.html')) {
            window.location.href = 'dispatch.html';
        } else if (role === 'customer' && !currentPage.includes('buyer.html')) {
            window.location.href = 'buyer.html';
        }
    })();
</script>

    <script>
        // --- 1. DYNAMIC PRODUCT FETCHING ---
        async function loadProducts(searchQuery = '') {
            const grid = document.getElementById('products-grid');
            
            try {
                // Fetch from your actual Supabase 'products' table
                let query = supabaseApp.from('products').select(`
                    id, 
                    title, 
                    price, 
                    image_url, 
                    seller_id,
                    profiles!seller_id(email) 
                `);

                // If user is searching, filter the titles
                if (searchQuery) {
                    query = query.ilike('title', `%${searchQuery}%`);
                }

                const { data: products, error } = await query;

                if (error) throw error;

                // Clear the loading text
                grid.innerHTML = '';

                if (products.length === 0) {
                    grid.innerHTML = `<p class="text-[#bdbebe] col-span-full">No products found.</p>`;
                    return;
                }

                // Loop through the database data and build the HTML cards
                products.forEach(product => {
                    // Fallback image if seller didn't upload one
                    const imgUrl = product.image_url || 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&q=80';
                    const sellerEmail = product.profiles ? product.profiles.email : 'Unknown Seller';

                    const cardHTML = `
                        <div class="group flex flex-col bg-[#232527] rounded-xl overflow-hidden border border-[#393b3d] hover:border-[#00b06f] transition-colors pb-4">
                            <div class="w-full aspect-[4/3] bg-[#111214] mb-3 relative overflow-hidden cursor-pointer" onclick="viewProduct('${product.id}')">
                                <img src="${imgUrl}" alt="${product.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                            </div>
                            <div class="px-4 flex-1 flex flex-col">
                                <h3 class="font-bold text-[15px] leading-tight mb-1 text-white cursor-pointer hover:underline" onclick="viewProduct('${product.id}')">${product.title}</h3>
                                <p class="text-[12px] text-[#757678] truncate mb-2">Sold by: ${sellerEmail}</p>
                                
                                <div class="flex items-center justify-between mt-auto pt-2">
                                    <span class="text-[#00b06f] font-bold text-[16px]">$${product.price.toFixed(2)}</span>
                                    <button onclick="addToCart('${product.id}')" class="bg-[#393b3d] hover:bg-[#00b06f] text-white text-xs font-bold px-3 py-1.5 rounded-md transition-colors">
                                        + Add
                                    </button>
                                </div>
                                <button onclick="startChat('${product.seller_id}')" class="w-full mt-3 bg-transparent border border-[#393b3d] hover:bg-[#393b3d] text-[#bdbebe] hover:text-white text-xs font-bold px-3 py-2 rounded-md transition-colors flex items-center justify-center gap-1">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                                    Message Seller
                                </button>
                            </div>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', cardHTML);
                });

            } catch (err) {
                console.error("Error loading products:", err);
                grid.innerHTML = `<p class="text-[#f87171] col-span-full">Error loading products. Make sure your 'products' table exists in Supabase.</p>`;
            }
        }

        // --- 2. SEARCH FUNCTIONALITY ---
        function handleSearch(e) {
            e.preventDefault(); // Prevent page reload
            const query = document.getElementById('search-input').value;
            loadProducts(query);
        }

        // --- 3. CART FUNCTIONALITY (Local State for now) ---
        let cartItems = 0;
        function addToCart(productId) {
            // In a real app, you'd save this to a 'cart' table in Supabase or localStorage
            cartItems++;
            document.getElementById('cart-count').innerText = cartItems;
            // Optional: Show a nice toast notification here!
        }
        function openCart() {
            alert(`You have ${cartItems} items in your cart. We will build the checkout page next!`);
        }

        // --- 4. DIRECT MESSAGING (DM) ROUTING ---
        function startChat(sellerId) {
            // This would navigate to a dedicated messages page or open a modal
            alert(`Opening chat with Seller ID: ${sellerId}\n\nTo make this work, we need a 'messages' table in Supabase!`);
        }
        function openMessages() {
            alert("Opening your inbox!");
        }
        function viewProduct(productId) {
            alert("Navigate to product detail page for ID: " + productId);
        }

        // Run this when the page loads!
        window.addEventListener('DOMContentLoaded', () => {
            loadProducts();
        });
    </script>
