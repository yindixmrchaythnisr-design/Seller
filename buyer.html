<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #393b3d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #545b64; }
    </style>
</head>
<body class="bg-[#111214] text-white h-screen flex overflow-hidden">

    <aside class="w-[80px] flex-shrink-0 bg-[#232527] border-r border-[#393b3d] flex flex-col items-center py-4 z-20">
        <div class="mb-8 cursor-pointer">
            <svg class="w-10 h-10 text-[#00b06f] transform rotate-[50deg]" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M0 0H24V24H0V0ZM8 8H16V16H8V8Z" />
            </svg>
        </div>

        <nav class="flex flex-col gap-6 w-full flex-1">
            <a href="#" class="flex flex-col items-center gap-1 group">
                <div class="w-10 h-10 rounded-full flex items-center justify-center bg-[#393b3d] text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                </div>
                <span class="text-[11px] font-semibold text-white">Home</span>
            </a>
            
            <a href="#" onclick="openMessages()" class="flex flex-col items-center gap-1 group">
                <div class="w-10 h-10 rounded-full flex items-center justify-center text-[#bdbebe] group-hover:bg-[#393b3d] group-hover:text-white transition-colors relative">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                </div>
                <span class="text-[11px] font-semibold text-[#bdbebe] group-hover:text-white">Messages</span>
            </a>

            <a href="#" class="flex flex-col items-center gap-1 group">
                <div class="w-10 h-10 rounded-full flex items-center justify-center text-[#bdbebe] group-hover:bg-[#393b3d] group-hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                </div>
                <span class="text-[11px] font-semibold text-[#bdbebe] group-hover:text-white">Orders</span>
            </a>
        </nav>

        <button onclick="handleLogout()" class="mt-auto mb-4 flex flex-col items-center gap-1 group">
            <div class="w-10 h-10 rounded-full flex items-center justify-center text-[#f87171] hover:bg-red-500/10 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </div>
            <span class="text-[11px] font-semibold text-[#f87171]">Logout</span>
        </button>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-[70px] px-8 flex items-center justify-between sticky top-0 bg-[#111214]/95 backdrop-blur z-10 border-b border-[#232527]">
            <h1 class="text-[24px] font-bold text-white tracking-tight">Home</h1>
            
            <div class="max-w-2xl w-full mx-8">
                <form id="search-form" onsubmit="handleSearch(event)" class="relative flex items-center w-full h-10 rounded-full bg-[#232527] border border-[#393b3d] focus-within:border-[#00b06f] transition-colors">
                    <div class="grid place-items-center h-full w-12 text-[#757678]">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    </div>
                    <input class="peer h-full w-full outline-none text-sm text-white bg-transparent pr-2 placeholder-[#757678]" type="text" id="search-input" placeholder="Search products..." />
                </form>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="openCart()" class="text-[#bdbebe] hover:text-white relative p-2 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    <span id="cart-count" class="absolute top-0 right-0 w-4 h-4 text-[10px] font-bold flex items-center justify-center bg-[#00b06f] text-white rounded-full border-2 border-[#111214]">0</span>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 space-y-10">
            <section>
                <div class="mb-5 flex justify-between items-end">
                    <div>
                        <h2 class="text-[20px] font-bold text-white">Marketplace Products</h2>
                        <p class="text-[14px] text-[#bdbebe]">Real items from verified sellers</p>
                    </div>
                </div>
                <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
                    <p class="text-[#bdbebe] col-span-full">Loading products...</p>
                </div>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>

    <script>
        // --- 1. PROTECTION LOGIC ---
        (async function protectPage() {
            const { data: { session } } = await supabaseApp.auth.getSession();
            if (!session) {
                window.location.href = 'index.html';
                return;
            }

            const { data: profile } = await supabaseApp
                .from('profiles')
                .select('role')
                .eq('id', session.user.id)
                .single();

            const role = profile?.role;
            if (role === 'seller') {
                window.location.href = 'seller.html';
            } else if (role === 'driver') {
                window.location.href = 'dispatch.html';
            }
        })();

        // --- 2. LOGOUT LOGIC ---
        async function handleLogout() {
            await supabaseApp.auth.signOut();
            window.location.href = 'index.html';
        }

        // --- 3. PRODUCT FETCHING ---
        async function loadProducts(searchQuery = '') {
            const grid = document.getElementById('products-grid');
            try {
                let query = supabaseApp.from('products').select(`*, profiles:seller_id(email)`);
                if (searchQuery) query = query.ilike('title', `%${searchQuery}%`);
                
                const { data: products, error } = await query;
                if (error) throw error;

                grid.innerHTML = products.length ? '' : '<p class="text-[#bdbebe] col-span-full">No products found.</p>';

                products.forEach(product => {
                    const imgUrl = product.image_url || 'https://via.placeholder.com/300';
                    const sellerEmail = product.profiles ? product.profiles.email : 'Unknown';
                    
                    grid.innerHTML += `
                        <div class="bg-[#232527] rounded-xl overflow-hidden border border-[#393b3d] p-4 flex flex-col">
                            <img src="${imgUrl}" class="w-full aspect-square object-cover rounded-lg mb-3">
                            <h3 class="font-bold text-white mb-1">${product.title}</h3>
                            <p class="text-xs text-[#757678] mb-3">Seller: ${sellerEmail}</p>
                            <div class="flex items-center justify-between mt-auto">
                                <span class="text-[#00b06f] font-bold">$${product.price}</span>
                                <button onclick="addToCart('${product.id}')" class="bg-[#00b06f] text-white text-xs font-bold px-3 py-1.5 rounded-md">+ Add</button>
                            </div>
                        </div>`;
                });
            } catch (err) {
                grid.innerHTML = `<p class="text-red-500 col-span-full">Error loading products.</p>`;
            }
        }

        // --- 4. UTILITIES ---
        function handleSearch(e) {
            e.preventDefault();
            loadProducts(document.getElementById('search-input').value);
        }

        let cartItems = 0;
        function addToCart() {
            cartItems++;
            document.getElementById('cart-count').innerText = cartItems;
        }

        window.onload = () => loadProducts();
    </script>
</body>
</html>
